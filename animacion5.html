<html>
<head>
    <title>Animacion 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            background-color: black;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: transparent;
            position: absolute;
            left: 300px;
            top: 50px;
        }

        .cuadrito2, .cuadrito3, .cuadrito4, .cuadrito5, .cuadrito6, .cuadrito7{
            width: 3px;
            height: 3px;
            background-color: transparent;
            position: absolute;
            animation: goku 3s infinite linear;
        }

        .cuadrito2{ 
            top: 10px; animation-duration: 4s; 
        }
        .cuadrito3{ 
            top: 120px; animation-duration: 2s; 
        }
        .cuadrito4{ 
            top: 79px; animation-duration: 1s; 
        }
        .cuadrito5{ 
            top: 30px; animation-duration: 3s; 
        }
        .cuadrito6{ 
            top: 160px; animation-duration: 2.5s;
         }
        .cuadrito7{ 
            top: 90px; animation-duration: 1.5s;
         }

        @keyframes goku{
            from{
                left: -10px;
                rotate: 2deg;
                transform: rotate(50deg);
            }
            to{
                left: 450px;
                rotate: 2deg;
                transform: rotate(45deg);
            }
        }

        .cuadrito img{
            width: 50px;
            height: 50px;
            transform: scaleX(-1);
        }
        .cuadrito2 img{
            width: 50px;
            height: 50px;
            transform: scaleX(1);
        }
        .cuadrito3 img{
            width: 50px;
            height: 50px;
            transform: scaleX(1);
        }
        .cuadrito4 img{
            width: 50px;
            height: 50px;
            transform: scaleX(1);
        }
        .cuadrito5 img{
            width: 50px;
            height: 50px;
            transform: scaleX(1);
        }
        .cuadrito6 img{
            width: 50px;
            height: 50px;
            transform: scaleX(1);
        }
        .cuadrito7 img{
            width: 50px;
            height: 50px;
            transform: scaleX(1);
        }
    </style>
</head>

<body>
    <div class="contenedor">

        <div class="cuadrito">
            <img src="img/goku.gif" alt="">
        </div>

        <div class="cuadrito2">
            <img src="img/fire.gif" alt="">
        </div>
        <div class="cuadrito3">
            <img src="img/fire.gif" alt="">
        </div>
        <div class="cuadrito4">
            <img src="img/fire.gif" alt="">
        </div>
        <div class="cuadrito5">
            <img src="img/fire.gif" alt="">
        </div>
        <div class="cuadrito6">
            <img src="img/fire.gif" alt="">
        </div>
        <div class="cuadrito7">
            <img src="img/fire.gif" alt="">
        </div>

    </div>
</body>
</html>
